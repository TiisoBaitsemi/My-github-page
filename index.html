<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pimp My Ride</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Pimp My Ride</h1>
        <p>Don't just buy your dream car—make your dream car.</p>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#products">Products</a>
        <a href="#gallery">Gallery</a>
        <a href="#contact">Contact</a>
    </nav>

    <main>
        <section id="products">
            <h2>Featured Products</h2>

            <div class="product">
                <h3>Custom Rims</h3>
                <img src="https://images.unsplash.com/photo-1549434474-8aa764265ba5?q=80&w=500" alt="Luxury Chrome Rims" class="product-image">
                <p>High pricing worth the quality.</p>
            </div>

            <div class="product">
                <h3>Premium Paint</h3>
                <img src="https://images.unsplash.com/photo-1615906655449-1048fd0bb771?q=80&w=500" alt="Custom Matte Paint Job" class="product-image">
                <p>Best pimp world wide.</p>
            </div>
        </section>

        <section id="gallery">
            <h2>Our Latest Builds</h2>
            <div class="gallery-grid">
                <img src="https://images.unsplash.com/photo-1605559424843-9e4c228bf1c2?q=80&w=400" alt="Pimped Muscle Car" class="gallery-img">
                <img src="https://images.unsplash.com/photo-1525609004556-c46c7d6cf048?q=80&w=400" alt="Custom Sports Car" class="gallery-img">
                <img src="https://images.unsplash.com/photo-1583121274602-3e2820c69888?q=80&w=400" alt="Luxury Interior" class="gallery-img">
            </div>
        </section>

        <section id="contact">
            <h2>Get a Quote</h2>
            <form class="quote-form">
                <label>Name:</label>
                <input type="text" required>
                <label>Car Model:</label>
                <input type="text" required>
                <button type="submit">Pimp My Ride!</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Pimp My Ride Garage</p>
    </footer>

</body>
</html>
